<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐔 Chicken Sandwich Showdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background: #000;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .title {
            font-family: 'Fredoka One', sans-serif;
            font-size: 4rem;
            color: #fff;
            text-shadow: 4px 4px 0 rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #fff;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .restaurants-grid {
            display: grid;
            gap: 20px;
            margin-bottom: 40px;
        }

        .restaurant-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
        }

        .restaurant-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }

        .restaurant-name {
            font-family: 'Fredoka One', sans-serif;
            font-size: 1.8rem;
            color: #FF6B6B;
            margin-bottom: 10px;
        }

        .votes-count {
            font-family: 'Fredoka One', sans-serif;
            font-size: 2rem;
            color: #FF6B6B;
            font-weight: 700;
        }

        .rank-badge {
            display: inline-block;
            background: #FFE66D;
            color: #333;
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .votes-display {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF6B6B 0%, #FFE66D 100%);
            transition: width 0.4s ease;
        }

        .vote-button {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF5252 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-family: 'Fredoka One', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 0 rgba(255, 107, 107, 0.4);
            white-space: nowrap;
        }

        .vote-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 0 rgba(255, 107, 107, 0.4);
        }

        .vote-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .footer {
            text-align: center;
            color: #fff;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .status {
            text-align: center;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-weight: bold;
        }

        .status.error {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }

        .status.success {
            background: rgba(6, 168, 125, 0.2);
            color: #06a87d;
        }

        @media (max-width: 600px) {
            .title {
                font-size: 2.5rem;
            }

            .restaurant-card {
                flex-direction: column;
                align-items: flex-start;
            }

            .vote-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="title">🐔 SHOWDOWN</div>
            <div class="subtitle">Bozeman Chicken Sandwich War</div>
        </header>

        <div id="status"></div>
        <div class="restaurants-grid" id="restaurantsList"></div>

        <div class="footer">
            Total Votes: <span id="totalVotes">0</span> 🎉
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001/api';
        let hasVoted = false;
        let restaurants = [];

        // Show message
        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = `status ${type}`;
        }

        // Load restaurants from database
        async function loadRestaurants() {
            try {
                const response = await fetch(`${API_URL}/restaurants`);
                const data = await response.json();
                restaurants = data;
                render();
            } catch (error) {
                showStatus('❌ Cannot connect to server. Make sure it is running!', 'error');
                console.error(error);
            }
        }

        // Render restaurants
        function render() {
            const container = document.getElementById('restaurantsList');
            const totalVotes = restaurants.reduce((sum, r) => sum + r.votes, 0);
            const maxVotes = Math.max(...restaurants.map(r => r.votes), 1);

            container.innerHTML = restaurants.map((restaurant, index) => {
                const percentage = (restaurant.votes / maxVotes) * 100;
                return `
                    <div class="restaurant-card">
                        <div>
                            <div class="rank-badge">#${index + 1}</div>
                            <div class="restaurant-name">${restaurant.name}</div>
                            <div class="votes-display">
                                <span class="votes-count">${restaurant.votes}</span> votes
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${percentage}%"></div>
                            </div>
                        </div>
                        <button class="vote-button" onclick="vote(${restaurant.id})" ${hasVoted ? 'disabled' : ''}>
                            ${hasVoted ? '✓ VOTED' : 'VOTE'}
                        </button>
                    </div>
                `;
            }).join('');

            document.getElementById('totalVotes').textContent = totalVotes;
        }

        // Send vote to server
        async function vote(restaurantId) {
            if (hasVoted) {
                alert('You already voted!');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/vote`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ restaurantId })
                });

                const data = await response.json();
                restaurants = data;
                hasVoted = true;
                sessionStorage.setItem('hasVoted', 'true');
                render();
                showStatus('✅ Vote recorded!', 'success');
            } catch (error) {
                showStatus('❌ Failed to record vote', 'error');
                console.error(error);
            }
        }

        // Check if user already voted
        if (sessionStorage.getItem('hasVoted')) {
            hasVoted = true;
        }

        // Load data every 3 seconds to show live updates
        loadRestaurants();
        setInterval(loadRestaurants, 3000);
    </script>
</body>
</html>
